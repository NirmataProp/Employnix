<!DOCTYPE html>
<html>
<head>
  <title>AI Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial;
      display: flex;
      height: 100vh;
      background: #ffffff;
    }

    /* Sidebar */
    #sidebar {
      width: 240px;
      background: #f5f5f7;
      padding: 15px;
      border-right: 1px solid #e0e0e0;
    }

    #newChat {
      background: #e9e9ec;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      font-weight: 600;
    }

    /* Main */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      max-width: 900px;
      margin: auto;
      width: 100%;
    }

    .msg {
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      max-width: 80%;
      line-height: 1.6;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      word-wrap: break-word;
    }

    .user {
      background: #d9f2ec;
      margin-left: auto;
    }

    .bot {
      background: #f7f7f8;
    }

    /* Input */
    #inputArea {
      display: flex;
      padding: 10px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }

    textarea {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 16px;
      resize: none;
      max-height: 120px;
    }

    button {
      margin-left: 10px;
      padding: 12px 16px;
      background: #10a37f;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 10px;
      font-weight: bold;
    }

    /* Cursor */
    .typing::after {
      content: "|";
      animation: blink 1s infinite;
    }

    #header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  border-bottom: 1px solid #eee;
  background: #ffffff;
  position: sticky;
  top: 0;
  z-index: 10;
}



#status {
  font-size: 14px;
  color: #10a37f;
}
#title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  font-weight: bold;
  color: #10a37f;
}

.logo {
  width: 28px;
  height: 28px;
}
    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* 📱 Mobile */
    @media (max-width: 768px) {
      #sidebar {
        display: none;
      }

      #messages {
        padding: 10px;
      }

      textarea {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

<div id="sidebar">
  <div id="newChat" onclick="resetChat()">➕ New Chat</div>
</div>

<div id="main">

   <div id="header">
   <div id="title">
 
  RohAI
</div>
    <div id="status">● Online</div>
  </div>

  <div id="messages"></div>

  <div id="inputArea">
    <textarea id="input" placeholder="Send a message..." rows="1"></textarea>
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
let messagesDiv = document.getElementById("messages");
let input = document.getElementById("input");

/* Auto resize textarea */
input.addEventListener("input", () => {
  input.style.height = "auto";
  input.style.height = input.scrollHeight + "px";
});

/* Enter to send */
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

async function send() {
  const msg = input.value.trim();
  if (!msg) return;

  addMessage(msg, "user");
  input.value = "";
  input.style.height = "auto";

  const botDiv = createBotMessage();

  try {
    const res = await fetch("https://employnix.onrender.com/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ message: msg })
    });


    const data = await res.json();

    await typeText(botDiv, data.reply);

  } catch (err) {
    botDiv.innerText = "⏳ Server waking up... try again";
  }
}

/* Add user message */
function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  messagesDiv.appendChild(div);
  scrollBottom();
}

/* Create bot message */
function createBotMessage() {
  const div = document.createElement("div");
  div.className = "msg bot typing";
  messagesDiv.appendChild(div);
  scrollBottom();
  return div;
}

/* 🔥 REAL typing (variable speed like human) */
async function typeText(el, text) {
  el.innerText = "";

  for (let i = 0; i < text.length; i++) {
    el.innerText += text[i];
    scrollBottom();

    let delay = 10;

    if (text[i] === ".") delay = 200;
    if (text[i] === ",") delay = 100;
    if (text[i] === " ") delay = 20;

    await new Promise(r => setTimeout(r, delay));
  }

  el.classList.remove("typing");
}

function scrollBottom() {
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function resetChat() {
  messagesDiv.innerHTML = "";
}
</script>

</body>
</html>
